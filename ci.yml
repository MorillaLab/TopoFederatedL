name: pTopoFL Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --timeout=120

      - name: Smoke-test experiment runner (2 seeds)
        run: |
          python ptopofl/experiments/run_experiments.py \
            --scenario table1 --seeds 2 --out results_ci/

      - name: Verify results file exists
        run: |
          test -f results_ci/table1.json && echo "Results OK"
          python -c "
          import json
          with open('results_ci/table1.json') as f:
              r = json.load(f)
          ptopofl_hc = r['Healthcare']['pTopoFL']['final_auc']
          assert ptopofl_hc > 0.5, f'AUC={ptopofl_hc}'
          print(f'pTopoFL HC AUC={ptopofl_hc:.4f}  ✓')
          "
